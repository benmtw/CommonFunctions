name: API Docs Auto Update

on:
  push:
    branches:
      - main
    paths:
      - "src/common_functions/**"
      - "scripts/generate_api_docs.py"
      - "pyproject.toml"
      - "README.md"

permissions:
  contents: write

jobs:
  update-api-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Regenerate API docs
        run: python scripts/generate_api_docs.py

      - name: Commit updated docs if needed
        run: |
          if ! git diff --quiet -- docs/API_REFERENCE.html; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/API_REFERENCE.html
            git commit -m "Auto-update API reference"
            git push
          fi
